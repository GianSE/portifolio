<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Monitor de Preços — Cesta Básica">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="55%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="#0a0b10"/>
  <rect width="800" height="450" fill="url(#glow1)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>

  <!-- monograma -->
  <text x="56" y="240" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="180" font-weight="800" fill="url(#brand)">M</text>

  <!-- fluxo medallion Bronze -> Silver -> Gold -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" fill="#a4abbb" transform="translate(300,330)">
    <g>
      <rect x="0" y="0" width="104" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <text x="52" y="22" text-anchor="middle" fill="#c98a4b">Bronze</text>
    </g>
    <path d="M112 17 H150" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <g transform="translate(158,0)">
      <rect x="0" y="0" width="94" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <text x="47" y="22" text-anchor="middle" fill="#c9cdd6">Silver</text>
    </g>
    <path d="M260 17 H298" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <g transform="translate(306,0)">
      <rect x="0" y="0" width="88" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
      <text x="44" y="22" text-anchor="middle" fill="#e8c15c">Gold</text>
    </g>
  </g>

  <text x="56" y="380" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" letter-spacing="1.5" fill="#6b7280">DADOS · PYTHON · POLARS · PREFECT</text>
  <text x="56" y="404" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f2f4f8">Monitor de Preços — Cesta Básica</text>
</svg>
