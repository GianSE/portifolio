<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comunicação Semântica com Aprendizado Federado">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="55%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="#0a0b10"/>
  <rect width="800" height="450" fill="url(#glow1)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>

  <!-- monograma -->
  <text x="56" y="240" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="180" font-weight="800" fill="url(#brand)">C</text>

  <!-- rede federada: 3 nós de dispositivo -> servidor central -->
  <g stroke="rgba(255,255,255,0.28)" stroke-width="1.5">
    <line x1="330" y1="290" x2="430" y2="330"/>
    <line x1="430" y1="360" x2="430" y2="330"/>
    <line x1="530" y1="290" x2="430" y2="330"/>
  </g>
  <g>
    <circle cx="330" cy="290" r="10" fill="rgba(124,92,255,0.35)" stroke="#7c5cff"/>
    <circle cx="430" cy="360" r="10" fill="rgba(79,140,255,0.35)" stroke="#4f8cff"/>
    <circle cx="530" cy="290" r="10" fill="rgba(34,211,238,0.35)" stroke="#22d3ee"/>
    <circle cx="430" cy="330" r="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)"/>
  </g>

  <text x="56" y="380" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" letter-spacing="1.5" fill="#6b7280">PYTORCH · FEDAVG · AUTOENCODERS · IEEE</text>
  <text x="56" y="404" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f2f4f8">Comunicação Semântica com Aprendizado Federado</text>
</svg>
