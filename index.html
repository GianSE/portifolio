<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0b10" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>Gian Pedro Rodrigues — Engenheiro de Software e Dados</title>
    <meta
      name="description"
      content="Portfólio de Gian Pedro Rodrigues — Engenheiro de Software e Dados. Construindo plataformas corporativas escaláveis, arquiteturas de dados e soluções de autenticação centralizada."
    />
    <meta name="author" content="Gian Pedro Rodrigues" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gian Pedro Rodrigues — Engenheiro de Software e Dados" />
    <meta
      property="og:description"
      content="Construindo plataformas corporativas escaláveis, arquiteturas de dados e soluções de autenticação centralizada."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gian Pedro Rodrigues — Engenheiro de Software e Dados" />
    <meta
      name="twitter:description"
      content="Construindo plataformas corporativas escaláveis, arquiteturas de dados e soluções de autenticação centralizada."
    />

    <!-- Anti-FOUC theme bootstrap: aplica o tema salvo antes do paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
